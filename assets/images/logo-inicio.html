<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <style>
      body {
        background-color: #0a0a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      .logo-container {
        position: relative;
        font-family: 'Arial', sans-serif;
        font-size: 4rem;
        color: #00f3ff;
        text-transform: lowercase;
        font-weight: bold;
        opacity: 0; 
      }

      .symbol {
        display: inline-block;
        width: 60px;
        height: 60px;
        border: 2px solid #00f3ff;
        border-radius: 50%;
        position: relative;
        margin-right: 10px;
        border-style: dashed; 
      }
      
      .symbol::after {
        content: '';
        position: absolute;
        top: 50%;
        left: -20px;
        width: 100px;
        height: 2px;
        background: #00f3ff;
        transform: translateY(-50%);
      }

      .text {
        position: relative;
      }

      .logo-container {
        animation: splashSequence 4s ease-in-out forwards;
      }

      @keyframes splashSequence {
        0% {
          opacity: 0;
          transform: scale(0.8);
          filter: blur(5px);
        }
        10% {
          opacity: 0.5;
          transform: scale(0.8);
          color: transparent;
          -webkit-text-stroke: 1px #00f3ff; 
        }
        35% {
          opacity: 0.8;
          transform: scale(0.85);
        }

        37% {
          opacity: 1;
          color: #00f3ff;
          -webkit-text-stroke: 0;
          transform: scale(0.85) skewX(10deg);
          text-shadow: -2px 0 red, 2px 0 blue;
        }
        40% {
          transform: scale(0.85) skewX(-5deg);
          text-shadow: 2px 0 red, -2px 0 blue;
        }
        45% {
          transform: scale(0.85) skewX(0deg);
          text-shadow: -5px 0 magenta, 5px 0 cyan;
          filter: brightness(1.5);
        }
        55% {
          transform: scale(0.85) skewX(0deg);
          text-shadow: 0 0 10px #00f3ff;
          filter: brightness(1);
        }

        60% {
          transform: scale(0.85);
          opacity: 1;
        }
        75% {
          transform: scale(2.5);
          opacity: 0.8;
          filter: blur(0px);
        }
        90% {
          transform: scale(5);
          opacity: 0.5;
          filter: blur(10px);
        }
        100% {
          transform: scale(1);
          opacity: 1;
          filter: blur(0px);
        }
      }
    </style>
</head>
<body>
  <div class="logo-container">
    <div class="symbol"></div>
    <span class="text">mundocancel</span>
  </div>
</body>
</html>
